<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>">
    <title>Dienstplan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/static/css/normalize.css?v={{ version }}">
    <link rel="stylesheet" href="/static/css/common.css?v={{ version }}">
    <link rel="stylesheet" href="/static/css/flatpickr.min.css?v={{ version }}">
    <link rel="stylesheet" href="/static/css/flatpickr-theme.css?v={{ version }}">
    <link rel="stylesheet" href="/static/css/events.css?v={{ version }}">
    <script src="/static/js/flatpickr.min.js"></script>
    <script src="/static/js/flatpickr-de.js"></script>
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/alpine.min.js" defer></script>
    <meta name="csrf-token" content="{{ request.cookies.get('csrf_token', '') }}">
    <meta name="page-mode" content="services">
    <script>
    document.addEventListener('htmx:configRequest', function(event) {
        var token = document.querySelector('meta[name="csrf-token"]')?.content;
        if (token) event.detail.headers['X-CSRF-Token'] = token;
    });
    </script>
    <script src="/static/js/events.js?v={{ version }}"></script>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="page-header">
        <a href="/overview" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Zurück
        </a>
        <h1>Dienstplan</h1>
        <p class="subtitle">{{ base_url }}</p>
    </div>

    <!-- Step 1: Date & Calendar Selection -->
    <div class="search-card">
        <div class="search-card-inner">
            <!-- Date range -->
            <div class="date-row">
                <div class="date-field">
                    <label for="start_date_display">Von</label>
                    <input type="text" id="start_date_display" required placeholder="Startdatum">
                    <input type="hidden" id="start_date" name="start_date" value="{{ start_date }}">
                </div>
                <span class="date-separator">&ndash;</span>
                <div class="date-field">
                    <label for="end_date_display">Bis</label>
                    <input type="text" id="end_date_display" required placeholder="Enddatum">
                    <input type="hidden" id="end_date" name="end_date" value="{{ end_date }}">
                </div>
            </div>

            <!-- Quick presets -->
            <div class="date-presets">
                <button type="button" id="today" class="preset-chip">Heute</button>
                <button type="button" id="this-week" class="preset-chip">Diese Woche</button>
                <button type="button" id="next-week" class="preset-chip">Nächste Woche</button>
            </div>

            <!-- All calendars selected (hidden) -->
            {% for calendar in calendars %}
            <input type="hidden" name="calendar_ids" value="{{ calendar['id'] }}" class="calendar-checkbox" checked>
            {% endfor %}

            <!-- Fetch button -->
            <button type="button" class="btn btn-fetch" id="fetch_btn">
                <span class="btn-label">Laden</span>
                <span class="btn-spinner" style="display:none;"><span class="spinner-ring-inline"></span> Laden&hellip;</span>
            </button>
        </div>
    </div>

    <!-- Step 2: Events list -->
    <div class="events-list" id="events-list" aria-live="polite">
        <div class="events-loading">
            <span class="spinner-ring-inline spinner-ring-inline--dark"></span>
            <span>Events werden geladen&hellip;</span>
        </div>
    </div>
</div>

<footer>
    <p>Version: {{ version }}</p>
</footer>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
    <title>Anmeldung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/static/css/normalize.css?v={{ version }}">
    <link rel="stylesheet" href="/static/css/common.css?v={{ version }}">
    <link rel="stylesheet" href="/static/css/login.css?v={{ version }}">
</head>
<body>
{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="container page-enter">
    <div class="login-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
    </div>
    <h1>Anmeldung</h1>
    <span class="base-url-badge">{{ base_url }}</span>

    <form method="POST">
        <label for="username">Benutzername:</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Passwort:</label>
        <input type="password" id="password" name="password" required>

        <input type="submit" value="Anmelden" class="btn btn-login">
    </form>
</div>
<footer>
    <p>Version: {{ version }}</p>
</footer>
</body>
</html>

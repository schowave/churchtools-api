name: Test and Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: churchtools-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true

    - name: Run tests in Docker container
      run: |
        # Create a volume for test reports
        mkdir -p coverage

        # Run tests in Docker container
        docker run --rm -v $(pwd)/coverage:/app/coverage churchtools-api:latest \
          /bin/bash -c "python -m pytest --cov=app tests/ --cov-report=xml --cov-report=term && \
          cp coverage.xml /app/coverage/"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage/coverage.xml
        fail_ci_if_error: false
